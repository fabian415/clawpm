services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  clawpm-db:
    image: postgres:16-alpine
    container_name: clawpm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clawpm}
      POSTGRES_USER: ${POSTGRES_USER:-clawpm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - clawpm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clawpm} -d ${POSTGRES_DB:-clawpm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── ClawPM Backend (Node.js API) ───────────────────────────────────────────
  clawpm-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: clawpm-backend:latest
    container_name: clawpm-backend
    restart: unless-stopped
    depends_on:
      clawpm-db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # 容器內無法用 localhost 到達 host 上的 OpenClaw port，改用 host.docker.internal
      OPENCLAW_GATEWAY_HOST: host.docker.internal
      FTP_HOST: host.docker.internal
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASS}
      DATABASE_URL: postgres://${POSTGRES_USER:-clawpm}:${POSTGRES_PASSWORD}@clawpm-db:5432/${POSTGRES_DB:-clawpm}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ${CLAWPM_WORKSPACE_BASE}:${CLAWPM_WORKSPACE_BASE}
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── FTP Server ─────────────────────────────────────────────────────────────
  openclaw-ftp-server:
    image: fauria/vsftpd
    container_name: openclaw-ftp-server
    restart: always
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"
    volumes:
      - ${CLAWPM_WORKSPACE_BASE}:/home/vsftpd/${FTP_USER}
    environment:
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASS}
      PASV_ADDRESS: ${FTP_SERVER_IP}
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
      LOCAL_UMASK: "000"
      FILE_OPEN_MODE: "0666"
      REVERSE_LOOKUP_ENABLE: "NO"

