services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  clawpm-db:
    image: postgres:16-alpine
    container_name: clawpm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clawpm}
      POSTGRES_USER: ${POSTGRES_USER:-clawpm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5433:5432"
    volumes:
      - clawpm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clawpm} -d ${POSTGRES_DB:-clawpm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── ClawPM Backend (Node.js API) ───────────────────────────────────────────
  clawpm-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: clawpm-backend:latest
    container_name: clawpm-backend
    restart: unless-stopped
    depends_on:
      clawpm-db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # 容器內無法用 localhost 到達 host 上的 OpenClaw port，改用 host.docker.internal
      OPENCLAW_GATEWAY_HOST: host.docker.internal
      # per-user 容器的 relay port 要發布在 backend（走 host.docker.internal→172.17.0.1）
      # 打得到的位址。綁 docker 橋接閘道即可，不會曝露到對外網卡。
      # 若你的 docker 預設橋接子網不是 172.17.0.0/16，改成對應的 .1 位址或設 0.0.0.0。
      CLAWPM_RELAY_BIND_HOST: ${CLAWPM_RELAY_BIND_HOST:-172.17.0.1}
      # FTP server 與 backend 同在 compose 網路內，直接用 service name
      FTP_HOST: openclaw-ftp-server
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASS}
      # # SearXNG 暫時走 host machine（host 上需有 SearXNG 跑在 SEARXNG_PORT）
      # SEARXNG_BASE_URL: http://host.docker.internal:${SEARXNG_PORT:-8080}
      # SearXNG 同在 compose 網路內，用 service name 連線（不能用 localhost）
      SEARXNG_BASE_URL: http://searxng-core:${SEARXNG_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-clawpm}:${POSTGRES_PASSWORD}@clawpm-db:5432/${POSTGRES_DB:-clawpm}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-3002}:${API_PORT:-3002}"
    volumes:
      - ${CLAWPM_WORKSPACE_BASE}:${CLAWPM_WORKSPACE_BASE}
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${API_PORT:-3002}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Unoserver（LibreOffice 轉檔 sidecar，給 PPTX 整頁截圖用） ───────────────
  clawpm-unoserver:
    build:
      context: ./docker/converter
    image: clawpm-unoserver:latest
    container_name: clawpm-unoserver
    restart: unless-stopped
    ports:
      # 發布到 host，讓動態建立的 per-user OpenClaw 容器透過
      # host.docker.internal 連線過來（它們不在這個 compose network 裡）
      - "${UNOSERVER_PORT:-2003}:2003"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── FTP Server ─────────────────────────────────────────────────────────────
  openclaw-ftp-server:
    image: fauria/vsftpd
    container_name: openclaw-ftp-server
    restart: always
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"
    volumes:
      - ${CLAWPM_WORKSPACE_BASE}:/home/vsftpd/${FTP_USER}
    environment:
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASS}
      PASV_ADDRESS: ${FTP_SERVER_IP}
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
      LOCAL_UMASK: "000"
      FILE_OPEN_MODE: "0666"
      REVERSE_LOOKUP_ENABLE: "NO"

  # ── SearXNG Search Engine ──────────────────────────────────────────────────
  searxng-core:
    container_name: searxng-core
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - searxng-valkey
    ports:
      - "${SEARXNG_HOST:+${SEARXNG_HOST}:}${SEARXNG_PORT:-8080}:${SEARXNG_PORT:-8080}"
    env_file:
      - ./searxng/.env
    volumes:
      - ./searxng/core-config/:/etc/searxng/:Z
      - searxng-core-data:/var/cache/searxng/
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  searxng-valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - searxng-valkey-data:/data/
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

